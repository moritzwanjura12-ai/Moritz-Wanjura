<!DOCTYPE html>
<html>
<head>
<title>Vanilla Options Calculator</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background:#0f1c2e;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:40px;
color:#4da3ff;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-box{
background:#16263f;
padding:20px;
border-radius:10px;
}

label{
display:block;
margin-bottom:6px;
color:#7fb3ff;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#0f1c2e;
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:25px;
border:none;
border-radius:8px;
background:#1f6feb;
color:white;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#3b82f6;
}

.results{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.result-card{
background:#16263f;
padding:30px;
border-radius:10px;
text-align:center;
}

.result-title{
color:#7fb3ff;
margin-bottom:10px;
}

.price{
font-size:40px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Black-Scholes Option Pricer</h1>

<div class="grid">

<div class="input-box">
<label>Spot Price</label>
<input id="S" value="52">
</div>

<div class="input-box">
<label>Strike Price</label>
<input id="K" value="50">
</div>

<div class="input-box">
<label>Maturity (years)</label>
<input id="T" value="0.25">
</div>

<div class="input-box">
<label>Risk-Free Rate (%)</label>
<input id="r" value="12">
</div>

<div class="input-box">
<label>Volatility (%)</label>
<input id="sigma" value="30">
</div>

<div class="input-box">
<label>Dividend Yield (%)</label>
<input id="q" value="0">
</div>

</div>

<button onclick="calculate()">Calculate Price</button>

<div class="results">

<div class="result-card">
<div class="result-title">Call Option</div>
<div id="call" class="price">0.000</div>
</div>

<div class="result-card">
<div class="result-title">Put Option</div>
<div id="put" class="price">0.000</div>
</div>

</div>

</div>

<script>

function N(x){
return (1+erf(x/Math.sqrt(2)))/2
}

function erf(x){
let sign = x>=0?1:-1
x=Math.abs(x)

let a1=0.254829592
let a2=-0.284496736
let a3=1.421413741
let a4=-1.453152027
let a5=1.061405429
let p=0.3275911

let t=1/(1+p*x)
let y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x)

return sign*y
}

function calculate(){

let S=parseFloat(document.getElementById("S").value)
let K=parseFloat(document.getElementById("K").value)
let T=parseFloat(document.getElementById("T").value)
let r=parseFloat(document.getElementById("r").value)/100
let sigma=parseFloat(document.getElementById("sigma").value)/100
let q=parseFloat(document.getElementById("q").value)/100

let d1=(Math.log(S/K)+(r-q+sigma*sigma/2)*T)/(sigma*Math.sqrt(T))
let d2=d1-sigma*Math.sqrt(T)

let call=S*Math.exp(-q*T)*N(d1)-K*Math.exp(-r*T)*N(d2)
let put=K*Math.exp(-r*T)*N(-d2)-S*Math.exp(-q*T)*N(-d1)

document.getElementById("call").innerHTML=call.toFixed(4)
document.getElementById("put").innerHTML=put.toFixed(4)

}

</script>

</body>
</html>
